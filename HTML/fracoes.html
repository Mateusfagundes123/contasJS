<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frações</title>
    <link rel="icon" type="image/png" href="../IMG/forma.png">
    <link rel="stylesheet" href="../CSS/styleFraceos.css">
</head>

<script src="../JS/scriptFracoes.js"></script>

<body>
    <header>
        <div>Cálculos</div>
        <ul class="linksHeader">
            <li><a href="../index.html">Home</a></li>
            <li><a href="#">Decimo Terceiro</a></li>
            <li><a href="./bhaskara.html">Bhaskara</a></li>
        </ul>
    </header>

    <section class="textFracao">
        <h1>Calculadora de frações</h1>
        <p>Insira os valores nos campos abaixos</p>
    </section>

    <section class="container">
        <div class="fracao">
            <input type="number" placeholder="P1" id="p1">
            <hr>
            <input type="number" placeholder="P2" id="p2">
        </div>
        <p class="operador" id="tipoOperacao"></p>
        <div class="fracao">
            <input type="number" placeholder="P3" id="p3">
            <hr>
            <input type="number" placeholder="P4" id="p4">
        </div>
        <button onclick="calcular()">Calcular</button>
        <table class="tabela">
            <tr>
                <td id="numerador"></td>
            </tr>
            <tr>
                <td id="denominador"></td>
            </tr>
        </table>

    </section>

    <section class="resultado">
        <p>Escolha a operação que deseja realizar</p>
        <select id="operacao" class="campoInformacao" onchange="icon()">
            <option value="soma">Soma</option>
            <option value="subtracao">Subtração</option>
            <option value="divisao">Divisão</option>
            <option value="multiplicação">multiplicação</option>
        </select>
    </section>

</body>

</html>
