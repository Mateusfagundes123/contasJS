        // function calcularFracao() {

        function mdc(p2, p4) {
            while (p4 !== 0) {
                let temp = p4;
                p4 = p2 % p4;
                p2 = temp;
            }
            return Math.abs(p2);
        }

        function mmc(p2, p4) {
            if (p2 === 0 || p4 === 0) return 0;
            //return Math.abs(a * b) / mdc(a, b);
            return Math.abs(p2 * p4) / mdc(p2, p4);
            //var resultadoMmc = Math.abs(p2 * p4) / mdc(p2, p4);
        }
